asyncapi: 3.1.0
info:
  title: Tick-Tack-Toe API
  version: 1.0.0
  description: 'Tick-Tack-Toe Game API

    <br/> This specification targets AsyncAPI 3.1 and keeps Socket.IO ACK values in
    the custom `x-ack` message extension.

    Socket.IO-specific transport details may still require application-level interpretation.

    '
servers:
  TICK_TACK_TOE_BACKEND:
    host: localhost:5000
    protocol: socketio
channels:
  root:
    address: /
    messages:
      Create_Game:
        $ref: '#/components/messages/Create_Game'
      game_created:
        $ref: '#/components/messages/game_created'
      Make_Move:
        $ref: '#/components/messages/Make_Move'
      move_made:
        $ref: '#/components/messages/move_made'
      game_drawn:
        $ref: '#/components/messages/game_drawn'
      game_won:
        $ref: '#/components/messages/game_won'
operations:
  receive_create_game:
    action: receive
    channel:
      $ref: '#/channels/root'
    messages:
    - $ref: '#/channels/root/messages/Create_Game'
  send_game_created:
    action: send
    channel:
      $ref: '#/channels/root'
    messages:
    - $ref: '#/channels/root/messages/game_created'
  receive_make_move:
    action: receive
    channel:
      $ref: '#/channels/root'
    messages:
    - $ref: '#/channels/root/messages/Make_Move'
  send_move_made:
    action: send
    channel:
      $ref: '#/channels/root'
    messages:
    - $ref: '#/channels/root/messages/move_made'
  send_game_drawn:
    action: send
    channel:
      $ref: '#/channels/root'
    messages:
    - $ref: '#/channels/root/messages/game_drawn'
  send_game_won:
    action: send
    channel:
      $ref: '#/channels/root'
    messages:
    - $ref: '#/channels/root/messages/game_won'
components:
  messages:
    Create_Game:
      name: create_game
      description: ''
    game_created:
      name: game_created
      description: ''
      payload:
        $ref: '#/components/schemas/GameCreatedData'
    Make_Move:
      name: make_move
      description: ''
      payload:
        $ref: '#/components/schemas/MakeMoveData'
      x-ack:
        $ref: '#/components/schemas/MakeMoveAckData'
    move_made:
      name: move_made
      description: ''
      payload:
        $ref: '#/components/schemas/MoveMadeData'
    game_drawn:
      name: game_drawn
      description: ''
      payload:
        $ref: '#/components/schemas/GameDrawnData'
    game_won:
      name: game_won
      description: ''
      payload:
        $ref: '#/components/schemas/GameWonData'
  schemas:
    NoSpec:
      description: Specification is not provided
    GameCreatedData:
      title: GameCreatedData
      type: object
      properties:
        game_id:
          title: Game Id
          description: The game id
          example: 1
          type: integer
      required:
      - game_id
    MakeMoveData:
      title: MakeMoveData
      type: object
      properties:
        game_id:
          title: Game Id
          description: The game id
          example: 1
          type: integer
        x:
          title: X
          description: The x coordinate
          example: 0
          type: integer
        y:
          title: Y
          description: The y coordinate
          example: 0
          type: integer
      required:
      - game_id
      - x
      - y
    MakeMoveAckData:
      title: MakeMoveAckData
      type: object
      properties:
        error:
          title: Error
          description: The error message
          example: Invalid move
          type: string
    MoveMadeData:
      title: MoveMadeData
      type: object
      properties:
        board:
          title: Board
          description: The game board
          example:
          - - X
            - O
            - ''
          - - ''
            - X
            - ''
          - - ''
            - ''
            - O
          type: array
          items:
            type: array
            items:
              type: string
        turn:
          title: Turn
          description: The current turn
          example: X
          type: string
      required:
      - board
      - turn
    GameDrawnData:
      title: GameDrawnData
      type: object
      properties: {}
    GameWonData:
      title: GameWonData
      type: object
      properties:
        winner:
          title: Winner
          description: The winner
          example: X
          type: string
      required:
      - winner
