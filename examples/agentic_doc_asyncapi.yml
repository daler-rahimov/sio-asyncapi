asyncapi: 3.1.0
info:
  title: Agent Export Demo
  version: 1.0.0
  description: 'Demo server that exports both AsyncAPI and agent-friendly schemas.

    <br/> This specification targets AsyncAPI 3.1 and keeps Socket.IO ACK values in
    the custom `x-ack` message extension.

    Socket.IO-specific transport details may still require application-level interpretation.

    '
servers:
  AGENT_EXPORT_DEMO:
    host: localhost:5000
    protocol: socketio
channels:
  root:
    address: /
    messages:
      Ask_Assistant:
        $ref: '#/components/messages/Ask_Assistant'
      assistant_reply:
        $ref: '#/components/messages/assistant_reply'
operations:
  receive_ask_assistant:
    action: receive
    channel:
      $ref: '#/channels/root'
    messages:
    - $ref: '#/channels/root/messages/Ask_Assistant'
    description: Accept a user prompt and start asynchronous assistant processing.
  send_assistant_reply:
    action: send
    channel:
      $ref: '#/channels/root'
    messages:
    - $ref: '#/channels/root/messages/assistant_reply'
    description: Server push event sent when the assistant has produced a reply.
components:
  messages:
    Ask_Assistant:
      name: ask_assistant
      description: Accept a user prompt and start asynchronous assistant processing.
      payload:
        $ref: '#/components/schemas/AskAssistantRequest'
      x-ack:
        $ref: '#/components/schemas/AskAssistantResponse'
    assistant_reply:
      name: assistant_reply
      description: Server push event sent when the assistant has produced a reply.
      payload:
        $ref: '#/components/schemas/AssistantReply'
  schemas:
    NoSpec:
      description: Specification is not provided
    AskAssistantRequest:
      title: AskAssistantRequest
      description: Request model for sending a user prompt to the assistant.
      type: object
      properties:
        prompt:
          title: Prompt
          description: Natural-language prompt from the user
          type: string
        conversation_id:
          title: Conversation Id
          description: Conversation identifier for multi-turn chats
          example: chat-123
          type: string
      required:
      - prompt
    AskAssistantResponse:
      title: AskAssistantResponse
      description: Ack model returned immediately after a prompt is accepted.
      type: object
      properties:
        accepted:
          title: Accepted
          description: Whether the prompt was accepted
          default: true
          type: boolean
        request_id:
          title: Request Id
          description: Server-generated request identifier
          type: string
      required:
      - request_id
    AssistantReply:
      title: AssistantReply
      description: Server push event containing the assistant's generated reply.
      type: object
      properties:
        request_id:
          title: Request Id
          description: Identifier of the related request
          type: string
        message:
          title: Message
          description: Generated reply text
          type: string
      required:
      - request_id
      - message
