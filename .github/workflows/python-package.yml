name: Build & Test

on:
  push:
    branches: ["develop", "master"]
  pull_request:
    branches: ["develop", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            pydantic-cache-key: "pydantic-v1"
            pydantic-version: ">=1.10.17,<2.0"
          - python-version: "3.11"
            pydantic-cache-key: "pydantic-v1"
            pydantic-version: ">=1.10.17,<2.0"
          - python-version: "3.11"
            pydantic-cache-key: "pydantic-v2"
            pydantic-version: ">=2.0,<3.0"
          - python-version: "3.12"
            pydantic-cache-key: "pydantic-v2"
            pydantic-version: ">=2.0,<3.0"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ matrix.pydantic-cache-key }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Pin Pydantic major version
        run: poetry run python -m pip install "pydantic[email]${{ matrix.pydantic-version }}"

      - name: Install asyncapi-cli
        run: npm install -g @asyncapi/cli

      - name: Validate example AsyncAPI spec
        run: asyncapi validate ./examples/downloader.yml

      - name: Run tests
        run: poetry run pytest tests -v --cov=./src/sio_asyncapi --cov-report=xml:./coverage.xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          files: ./coverage.xml
